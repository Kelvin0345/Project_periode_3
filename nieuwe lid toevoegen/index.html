<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nieuw lid toevoegen</title>
  https://dev.azure.com/338451/Project%203
</head>
<body>

  <nav>
    <div class="nav-left">
      <a href="#" class="nav-link">Home</a>
      <a href="#" class="nav-link">Informatie</a>
      <a href="#" class="nav-link">Lessen</a>
      <a href="#" class="nav-link">Contact</a>
    </div>
    <div class="nav-right">
      <a href="#" class="nav-link">Registreren</a>
      <a href="#" class="nav-link">Login</a>
    </div>
  </nav>

  <div class="page-container">
    <div class="title">Nieuw lid toevoegen</div>
    <div class="subtitle-line"></div>

    <div class="content-grid">
      <div class="card">
        <h2>Formulier</h2>

        <div class="form-group">
          <label for="voornaam">Voornaam</label>
          <input type="text" id="voornaam" placeholder="Vul voornaam in">
        </div>

        <div class="form-group">
          <label for="achternaam">Achternaam</label>
          <input type="text" id="achternaam" placeholder="Vul achternaam in">
        </div>

        <div class="form-group">
          <label for="email">E-mail</label>
          <input type="email" id="email" placeholder="Vul e-mail in">
        </div>

        <div class="button-group">
          <button class="btn-primary" onclick="voegLidToe()">Nieuw lid toevoegen</button>
          <button class="btn-secondary" onclick="annuleerFormulier()">Annuleren</button>
        </div>

        <div id="melding" class="message"></div>
      </div>

      <div class="card">
        <h2>Ledenoverzicht</h2>

        <table>
          <thead>
            <tr>
              <th>Voornaam</th>
              <th>Achternaam</th>
              <th>E-mail</th>
            </tr>
          </thead>
          <tbody id="ledenLijst">
            <tr>
              <td>issam</td>
              <td>Barzizaoua</td>
              <td>ibarzizaoua@gmail.com</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    function voegLidToe() {
      const voornaam = document.getElementById("voornaam").value.trim();
      const achternaam = document.getElementById("achternaam").value.trim();
      const email = document.getElementById("email").value.trim();
      const melding = document.getElementById("melding");

      if (voornaam === "" || achternaam === "" || email === "") {
        melding.textContent = "Het lid kan niet worden aangemaakt";
        melding.className = "message error";
        return;
      }

      if (!email.includes("@") || !email.includes(".")) {
        melding.textContent = "Het lid kan niet worden aangemaakt";
        melding.className = "message error";
        return;
      }

      melding.textContent = "Het lid kan niet worden aangemaakt";
      melding.className = "message error";
    }

    function annuleerFormulier() {
      document.getElementById("voornaam").value = "";
      document.getElementById("achternaam").value = "";
      document.getElementById("email").value = "";

      const melding = document.getElementById("melding");
      melding.style.display = "none";
      melding.className = "message";
      melding.textContent = "";
    }
  </script>

</body>
</html>
