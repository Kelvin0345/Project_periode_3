<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nieuw lid toevoegen</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(rgba(8, 15, 35, 0.75), rgba(8, 15, 35, 0.75)),
        url('https://images.unsplash.com/photo-1583454110551-21f2fa2afe61?auto=format&fit=crop&w=1600&q=80')
        no-repeat center center/cover;
      color: white;
    }

    nav {
      width: 100%;
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(6px);
    }

    .nav-left,
    .nav-right {
      display: flex;
      gap: 18px;
      align-items: center;
    }

    .nav-link {
      text-decoration: none;
      color: white;
      background: rgba(0, 0, 0, 0.45);
      padding: 12px 20px;
      border-radius: 20px;
      font-weight: bold;
      transition: 0.3s;
    }

    .nav-link:hover {
      background: rgba(37, 99, 235, 0.8);
    }

    .page-container {
      max-width: 1200px;
      margin: 70px auto;
      padding: 20px;
    }

    .title {
      font-size: 72px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .subtitle-line {
      width: 550px;
      height: 3px;
      background-color: rgba(255, 255, 255, 0.8);
      margin-bottom: 40px;
    }

    .content-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
      align-items: start;
    }

    .card {
      background: rgba(15, 23, 42, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 32px;
      backdrop-filter: blur(8px);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.25);
    }

    .card h2 {
      font-size: 32px;
      margin-bottom: 25px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      font-size: 18px;
    }

    .form-group input {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      outline: none;
    }

    .button-group {
      display: flex;
      gap: 14px;
      margin-top: 18px;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 16px 22px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn-primary {
      background: #2563eb;
      color: white;
    }

    .btn-primary:hover {
      background: #1d4ed8;
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.15);
      color: white;
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.25);
    }

    .message {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 12px;
      font-weight: bold;
      display: none;
    }

    .message.error {
      display: block;
      background: rgba(220, 38, 38, 0.2);
      border: 1px solid rgba(248, 113, 113, 0.5);
      color: #fecaca;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border-radius: 14px;
    }

    th, td {
      padding: 16px;
      text-align: left;
    }

    th {
      background: #2f5cc2;
      color: white;
      font-size: 18px;
    }

    td {
      background: rgba(255, 255, 255, 0.1);
      font-size: 16px;
    }

    @media (max-width: 900px) {
      .content-grid {
        grid-template-columns: 1fr;
      }

      .title {
        font-size: 48px;
      }

      .subtitle-line {
        width: 100%;
      }
    }
  </style>
</head>
<body>

  <nav>
    <div class="nav-left">
      <a href="#" class="nav-link">Home</a>
      <a href="#" class="nav-link">Informatie</a>
      <a href="#" class="nav-link">Lessen</a>
      <a href="#" class="nav-link">Contact</a>
    </div>
    <div class="nav-right">
      <a href="#" class="nav-link">Registreren</a>
      <a href="#" class="nav-link">Login</a>
    </div>
  </nav>

  <div class="page-container">
    <div class="title">Nieuw lid toevoegen</div>
    <div class="subtitle-line"></div>

    <div class="content-grid">
      <div class="card">
        <h2>Formulier</h2>

        <div class="form-group">
          <label for="voornaam">Voornaam</label>
          <input type="text" id="voornaam" placeholder="Vul voornaam in">
        </div>

        <div class="form-group">
          <label for="achternaam">Achternaam</label>
          <input type="text" id="achternaam" placeholder="Vul achternaam in">
        </div>

        <div class="form-group">
          <label for="email">E-mail</label>
          <input type="email" id="email" placeholder="Vul e-mail in">
        </div>

        <div class="button-group">
          <button class="btn-primary" onclick="voegLidToe()">Nieuw lid toevoegen</button>
          <button class="btn-secondary" onclick="annuleerFormulier()">Annuleren</button>
        </div>

        <div id="melding" class="message"></div>
      </div>

      <div class="card">
        <h2>Ledenoverzicht</h2>

        <table>
          <thead>
            <tr>
              <th>Voornaam</th>
              <th>Achternaam</th>
              <th>E-mail</th>
            </tr>
          </thead>
          <tbody id="ledenLijst">
            <tr>
              <td>issam</td>
              <td>Barzizaoua</td>
              <td>ibarzizaoua@gmail.com</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    function voegLidToe() {
      const voornaam = document.getElementById("voornaam").value.trim();
      const achternaam = document.getElementById("achternaam").value.trim();
      const email = document.getElementById("email").value.trim();
      const melding = document.getElementById("melding");

      if (voornaam === "" || achternaam === "" || email === "") {
        melding.textContent = "Het lid kan niet worden aangemaakt";
        melding.className = "message error";
        return;
      }

      if (!email.includes("@") || !email.includes(".")) {
        melding.textContent = "Het lid kan niet worden aangemaakt";
        melding.className = "message error";
        return;
      }

      melding.textContent = "Het lid kan niet worden aangemaakt";
      melding.className = "message error";
    }

    function annuleerFormulier() {
      document.getElementById("voornaam").value = "";
      document.getElementById("achternaam").value = "";
      document.getElementById("email").value = "";

      const melding = document.getElementById("melding");
      melding.style.display = "none";
      melding.className = "message";
      melding.textContent = "";
    }
  </script>

</body>
</html>
